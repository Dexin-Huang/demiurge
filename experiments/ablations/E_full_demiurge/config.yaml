# Condition E: Full DEMIURGE — frozen scaffold + gating + property memory
condition: full_demiurge
scaffold_type: frozen
use_gating: true
use_property_memory: true

model:
  lewm_embed_dim: 192
  num_slots: 8
  num_freq_bands: 8
  context_dim: 128
  prop_dim: 32
  gamma: 0.05
  pred_layers: 4
  pred_heads: 4
  dropout: 0.1

training:
  lr: 1e-4
  slow_lr_factor: 0.1
  weight_decay: 1e-3
  epochs: 100
  batch_size: 64

loss:
  lambda_geom: 0.1
  lambda_slow: 0.05
  lambda_gate: 0.01
  lambda_contact: 0.1

monitoring:
  gate_entropy_alert_threshold: 0.1
  property_autocorr_target: 0.9

notes: >
  Complete three-layer stack. The full bet.
  Property memory autocorrelation must exceed 0.9 across 10 frames.
